<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot to Bike Transformer</title>
    <style>
        :root {
            --speed: 0.8s;
            --accent: #ff0055;
            --metal: #1a1a1a;
            --glow: 0 0 15px #ff0055;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050505;
            overflow: hidden;
            perspective: 2000px;
            font-family: 'Orbitron', sans-serif;
        }

        /* UI Styling */
        .ui-panel {
            position: absolute;
            bottom: 40px;
            z-index: 10;
        }

        button {
            background: black;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
            box-shadow: var(--glow);
        }

        button:hover {
            background: var(--accent);
            color: white;
        }

        /* The Transformer Container */
        .stage {
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(30deg);
            transition: transform 1s ease;
        }

        /* Movement Animation */
        .active .stage {
            transform: rotateX(-10deg) rotateY(-20deg) translateY(50px);
        }

        .part {
            position: absolute;
            background: var(--metal);
            border: 1px solid #333;
            transition: all var(--speed) cubic-bezier(0.5, 0, 0.3, 1.5);
            transform-style: preserve-3d;
        }

        /* --- BODY COMPONENTS --- */

        /* Central Chassis / Torso */
        .torso {
            width: 60px; height: 80px;
            left: 120px; top: 100px;
            border-radius: 4px;
        }
        .active .torso {
            transform: rotateX(80deg) translateZ(-20px) scaleY(1.2);
            background: #111;
        }

        /* Head / Handlebars */
        .head {
            width: 30px; height: 30px;
            left: 135px; top: 70px;
            background: var(--accent);
            box-shadow: var(--glow);
        }
        .active .head {
            transform: translateY(40px) translateZ(40px) rotateX(-45deg);
            width: 80px; height: 10px; left: 110px;
        }

        /* Arms / Front Fork */
        .arm {
            width: 15px; height: 80px;
            top: 100px;
        }
        .arm.left { left: 100px; }
        .arm.right { left: 185px; }

        .active .arm {
            height: 100px;
            top: 120px;
        }
        .active .arm.left { transform: translateX(25px) rotateZ(-90deg) rotateY(40deg); }
        .active .arm.right { transform: translateX(-25px) rotateZ(90deg) rotateY(-40deg); }

        /* Legs / Wheels */
        .leg {
            width: 25px; height: 100px;
            top: 180px;
            background: #222;
        }
        .leg.left { left: 120px; }
        .leg.right { left: 155px; }

        /* Wheel Morphing */
        .leg::after {
            content: '';
            position: absolute;
            bottom: 0; width: 40px; height: 40px;
            background: #000;
            border: 3px solid #333;
            border-radius: 50%;
            left: -10px;
            opacity: 0;
            transition: var(--speed);
        }

        .active .leg {
            top: 150px;
            height: 40px;
        }
        .active .leg.left { transform: translate(-60px, 10px) rotateY(90deg); }
        .active .leg.right { transform: translate(60px, 10px) rotateY(90deg); }

        .active .leg::after {
            opacity: 1;
            box-shadow: inset 0 0 10px var(--accent);
        }

        /* Glowing Core */
        .core {
            position: absolute;
            width: 20px; height: 20px;
            background: var(--accent);
            border-radius: 50%;
            left: 20px; top: 20px;
            box-shadow: var(--glow);
        }

        /* Ground Reflection */
        .ground {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,0,85,0.1) 0%, transparent 70%);
            transform: rotateX(90deg) translateZ(-150px);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <button onclick="document.body.classList.toggle('active')">Toggle Mode</button>
    </div>

    <div class="stage">
        <div class="ground"></div>
        
        <div class="part torso">
            <div class="core"></div>
        </div>
        
        <div class="part head"></div>
        
        <div class="part arm left"></div>
        <div class="part arm right"></div>
        
        <div class="part leg left"></div>
        <div class="part leg right"></div>
    </div>

    <script>
        // Optional: Add a subtle mouse parallax
        document.addEventListener('mousemove', (e) => {
            if(!document.body.classList.contains('active')) {
                const x = (window.innerWidth / 2 - e.pageX) / 20;
                const y = (window.innerHeight / 2 - e.pageY) / 20;
                document.querySelector('.stage').style.transform = `rotateX(${-20 + y}deg) rotateY(${30 + x}deg)`;
            }
        });
    </script>
</body>
</html>
